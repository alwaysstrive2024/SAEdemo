apiVersion: apps/v1
kind: Deployment
metadata:
  name: sae-frontend
  namespace: gufy
  labels:
    app: sae-frontend
spec:
  replicas: 2  # 前端无状态，可以轻松水平扩展
  selector:
    matchLabels:
      app: sae-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: sae-frontend
    spec:
      imagePullSecrets:
        - name: harbor-cred
      containers:
        - name: frontend
          image: harbor.aixiongan.org.cn:9443/saedemo/gufy-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
