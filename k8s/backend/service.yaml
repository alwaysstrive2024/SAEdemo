apiVersion: v1
kind: Service
metadata:
  name: sae-backend-svc
  namespace: gufy
  labels:
    app: sae-backend
spec:
  # ClusterIP 即可：前端 nginx 和后端在同一个 namespace，
  # nginx 通过内网 DNS sae-backend-svc 直接访问，不需要对外暴露。
  type: ClusterIP
  ports:
    - port: 80         # 前端 nginx proxy_pass 连接的端口
      targetPort: 8001 # FastAPI 监听的容器端口
      protocol: TCP
      name: http
  selector:
    app: sae-backend
