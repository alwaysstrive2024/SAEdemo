name: CI/CD — Build & Deploy Frontend + Backend to K8s

on:
  push:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Job 1: 重建 base 镜像（只有 requirements.txt 变动时才触发）
  # 此 Job 体积约 5.5GB，正常迭代中跳过，仅依赖更新时执行
  # ─────────────────────────────────────────────────────────────────────────
  build-backend-base:
    runs-on: ubuntu-latest
    outputs:
      base_rebuilt: ${{ steps.check.outputs.changed }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 2  # 需要对比上一个 commit

      - name: Check if requirements.txt changed
        id: check
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q "backend/requirements.txt"; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "requirements.txt 已变动，将重建 base 镜像..."
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "requirements.txt 未变动，跳过 base 镜像构建。"
          fi

      - name: Log in to Harbor Registry
        if: steps.check.outputs.changed == 'true'
        uses: docker/login-action@v2
        with:
          registry: harbor.aixiongan.org.cn:9443
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and Push Backend BASE Image (~5.5GB, slow)
        if: steps.check.outputs.changed == 'true'
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile.base
          push: true
          tags: harbor.aixiongan.org.cn:9443/saedemo/sae-backend-base:latest

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2: 构建业务镜像（每次 push 都执行，继承 base，仅 <1MB 代码层）
  # ─────────────────────────────────────────────────────────────────────────
  build-backend:
    runs-on: ubuntu-latest
    needs: [build-backend-base]  # 确保 base 已经是最新的

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Log in to Harbor Registry
        uses: docker/login-action@v2
        with:
          registry: harbor.aixiongan.org.cn:9443
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and Push Backend Image (<1MB, fast)
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: harbor.aixiongan.org.cn:9443/saedemo/sae-backend:latest

  # ─────────────────────────────────────────────────────────────────────────
  # Job 3: 构建前端镜像（多阶段构建，仅 node_modules + dist）
  # ─────────────────────────────────────────────────────────────────────────
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Log in to Harbor Registry
        uses: docker/login-action@v2
        with:
          registry: harbor.aixiongan.org.cn:9443
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: harbor.aixiongan.org.cn:9443/saedemo/gufy-frontend:latest
          build-args: |
            VITE_API_URL=/api

  # ─────────────────────────────────────────────────────────────────────────
  # Job 4: 部署到 K8s（前后端镜像都推送完毕后执行）
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Set Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_DATA }}" | base64 --decode > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Apply Backend K8s Manifests
        run: |
          kubectl apply -f ./k8s/backend/deployment.yaml -n gufy
          kubectl apply -f ./k8s/backend/service.yaml -n gufy

      - name: Apply Frontend K8s Manifests
        run: |
          kubectl apply -f ./k8s/frontend/deployment.yaml -n gufy
          kubectl apply -f ./k8s/frontend/service.yaml -n gufy
          kubectl apply -f ./k8s/frontend/ingress.yaml -n gufy

      - name: Rolling Restart (pull fresh :latest images)
        run: |
          kubectl rollout restart deployment sae-backend  -n gufy
          kubectl rollout restart deployment sae-frontend -n gufy

      - name: Wait for Rollout to Complete
        run: |
          kubectl rollout status deployment sae-backend  -n gufy --timeout=300s
          kubectl rollout status deployment sae-frontend -n gufy --timeout=120s
