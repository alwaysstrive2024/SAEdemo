name: CI/CD — Build & Deploy Frontend + Backend to K8s

on:
  push:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Job 1: Build & Push Frontend Image
  # ─────────────────────────────────────────────────────────────────────────
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Log in to Harbor Registry
        uses: docker/login-action@v2
        with:
          registry: harbor.aixiongan.org.cn:9443
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: harbor.aixiongan.org.cn:9443/saedemo/gufy-frontend:latest
          build-args: |
            VITE_API_URL=/api

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2: Build & Push Backend Image
  # ─────────────────────────────────────────────────────────────────────────
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Log in to Harbor Registry
        uses: docker/login-action@v2
        with:
          registry: harbor.aixiongan.org.cn:9443
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: harbor.aixiongan.org.cn:9443/gufy/sae-backend:latest

  # ─────────────────────────────────────────────────────────────────────────
  # Job 3: Deploy to K8s (runs after both images are pushed)
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]  # Wait for both images to be ready

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Set Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_DATA }}" | base64 --decode > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Apply Backend K8s Manifests
        run: |
          kubectl apply -f ./k8s/backend/deployment.yaml -n gufy
          kubectl apply -f ./k8s/backend/service.yaml -n gufy

      - name: Apply Frontend K8s Manifests
        run: |
          kubectl apply -f ./k8s/frontend/deployment.yaml -n gufy
          kubectl apply -f ./k8s/frontend/service.yaml -n gufy
          kubectl apply -f ./k8s/frontend/ingress.yaml -n gufy

      - name: Rolling Restart (pull fresh :latest images)
        run: |
          kubectl rollout restart deployment sae-backend  -n gufy
          kubectl rollout restart deployment sae-frontend -n gufy

      - name: Wait for Rollout to Complete
        run: |
          kubectl rollout status deployment sae-backend  -n gufy --timeout=300s
          kubectl rollout status deployment sae-frontend -n gufy --timeout=120s
